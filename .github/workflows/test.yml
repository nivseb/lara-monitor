name: Tests

on:
    push:
        branches:
            - main
            - '*.x'
    pull_request:
    schedule:
        -   cron: '0 5 * * *'

jobs:
    define_matrix:
        runs-on: ubuntu-latest
        outputs:
            colors: ${{ steps.colors.outputs.colors }}
        steps:
            -   name: Define Colors
                id: colors
                run: |
                    echo 'php=["8.5", "8.4", "8.3", "8.2"]' >> "$GITHUB_OUTPUT"
                    echo 'laravel=["13.*", "12.*", "11.*"]' >> "$GITHUB_OUTPUT"
                    echo 'dependency=["prefer-lowest", "prefer-stable"]' >> "$GITHUB_OUTPUT"
    unit_test:
        name: "Unit-Testing with P${{ matrix.php }} , L${{ matrix.laravel }} and ${{ matrix.dependency }} dependencies"
        needs:
            - define_matrix
        runs-on: ubuntu-latest
        strategy:
            fail-fast: true
            matrix:
                php: ${{ fromJson(needs.define-matrix.outputs.php) }}
                laravel: ${{ fromJson(needs.define-matrix.outputs.laravel) }}
                dependency: ${{ fromJson(needs.define-matrix.dependency.laravel) }}
                exclude:
                    -   php: "8.2"
                        laravel: "13.*"
                include:
                    -   laravel: "13.*"
                        testbench: 11.*
                    -   laravel: "12.*"
                        testbench: 10.*
                    -   laravel: "11.*"
                        testbench: 9.*
        steps:
            -   uses: "actions/checkout@v4"
            -   uses: "shivammathur/setup-php@v2"
                with:
                    php-version: "${{ matrix.php }}"
                    coverage: xdebug
            -   name: Install dependencies
                run: |
                    composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
                    composer update --${{ matrix.dependency }} --prefer-dist --no-interaction
            -   name: Tests
                run: ./vendor/bin/pest --coverage --group=unit --parallel
            -   name: 'Upload Artifact'
                uses: actions/upload-artifact@v4
                with:
                    name: "coverage-reports-unit-${{ matrix.php }}-${{ matrix.dependencies }}"
                    path: |
                        tests/test_results/clover.xml
                        tests/test_results/cobertura.xml
                        tests/test_results/coverage.txt
                    retention-days: 2
    component_test:
        name: "Component-Testing with P${{ matrix.php }} , L${{ matrix.laravel }} and ${{ matrix.dependency }} dependencies"
        needs:
            - define_matrix
            - unit_test
        runs-on: ubuntu-latest
        strategy:
            fail-fast: true
            matrix:
                php: ${{ fromJson(needs.define-matrix.outputs.php) }}
                laravel: ${{ fromJson(needs.define-matrix.outputs.laravel) }}
                dependency: ${{ fromJson(needs.define-matrix.dependency.laravel) }}
                exclude:
                    -   php: "8.2"
                        laravel: "13.*"
                include:
                    -   laravel: "13.*"
                        testbench: 11.*
                    -   laravel: "12.*"
                        testbench: 10.*
                    -   laravel: "11.*"
                        testbench: 9.*
        steps:
            -   uses: "actions/checkout@v4"
            -   uses: "shivammathur/setup-php@v2"
                with:
                    php-version: "${{ matrix.php }}"
                    coverage: xdebug
            -   name: Install dependencies
                run: |
                    composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
                    composer update --${{ matrix.dependency }} --prefer-dist --no-interaction
            -   name: Tests
                run: ./vendor/bin/pest --coverage --group=component --parallel
            -   name: 'Upload Artifact'
                uses: actions/upload-artifact@v4
                with:
                    name: "coverage-reports-component-${{ matrix.php }}-${{ matrix.dependencies }}"
                    path: |
                        tests/test_results/clover.xml
                        tests/test_results/cobertura.xml
                        tests/test_results/coverage.txt
                    retention-days: 2
